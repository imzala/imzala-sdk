        require_tc_verification: false
        require_biometric_verification: false
        reminder_settings: ""
      properties:
        template_id:
          description: GET /api/v1/templates listesinden veya dashboard'dan kopyalayın
          format: uuid
          type: string
        title:
          description: Sözleşme başlığı (yoksa template adı kullanılır)
          type: string
        description:
          type: string
        party_mapping:
          items:
            $ref: "#/components/schemas/PartyMappingInput"
          minItems: 1
          type: array
        variables:
          additionalProperties:
            $ref: "#/components/schemas/PartyMappingInput_variables_value"
          description: |
            **Root scope** — partilerden bağımsız field'lara gönderilen değerler.
            Item'ın template_party_id'si NULL ise (partisiz) buradan dolar.
            Multi-party şablonda kira_baslangic_tarihi gibi paylaşılan field'lar.
          type: object
        has_timestamp:
          default: false
          description: TÜBİTAK zaman damgası
          type: boolean
        send_sms_notifications:
          default: true
          type: boolean
        send_email_notifications:
          default: true
          type: boolean
        sms_title:
          default: CODECK
          description: SMS gönderici adı
          type: string
        sms_content:
          description: |
            Custom SMS gövdesi. **Sadece** çağıran organizasyon **PRO veya ENTERPRISE planda**
            ise ve aktif `OrganizationSmsConfig` (sender_name dolu) varsa kabul edilir;
            aksi halde 403 `SMS_CUSTOMIZATION_NOT_ALLOWED` döner.

            FREE/BASIC planda olan veya kendi SMS sağlayıcısı tanımlı olmayan
            müşterilerin marka itibarını korumak için sistem default sağlayıcısı (Codeck NetGSM)
            ile gönderim yapılır ve özel metin reddedilir. Kendi sağlayıcınızı tanımlamak için
            Dashboard → Organizasyon → SMS Ayarları sayfasını kullanın.

            Boş string / null gönderirseniz "clear" olarak yorumlanır (gating'den geçer).
          type: string
        email_content:
          description: Custom e-posta gövdesi
          type: string
        expiry_date:
          format: date-time
          type: string
        require_tc_verification:
          default: false
          type: boolean
        require_biometric_verification:
          default: false
          type: boolean
        reminder_settings:
          allOf:
          - $ref: "#/components/schemas/ReminderSettings"
          description: |
            Bu sözleşme için hatırlatma ayarlarını **şablon default'unu override** ederek
            belirtir. Yollanmazsa şablonun `reminder_*` alanları kullanılır
            (PUT /api/templates/:id ile dashboard'dan kaydedilen değerler);
            şablonda da yoksa `{enabled:true, intervals_hours:[48], max_reminders:1, channels:["email"]}`
            default'u uygulanır. Demand oluşumunda `ReminderConfig` satırı yaratılır
            ve BullMQ kuyruğuna scheduled hatırlatmalar yazılır.
      required:
      - party_mapping
      - template_id
      type: object
    ReminderSettings:
      description: |
        Hatırlatma yapılandırması. Şablon (`Template.reminder_*`) ve sözleşme
        (`ReminderConfig`) arasında aynı şemaya sahiptir.
      properties:
        enabled:
          default: true
          description: false → hiç hatırlatma gönderilmez (cron schedule edilmez)
          type: boolean
        intervals_hours:
          default:
          - 48
          description: |
            Sözleşmenin oluşturulduğu andan itibaren saat cinsinden hatırlatma
            aralıkları. Örn. `[24, 72, 168]` → 24 saat sonra, 3 gün sonra ve
            7 gün sonra. `max_reminders` ile limit edilir.
          example:
          - 24
          - 72
          items:
            minimum: 1
            type: integer
          type: array
        max_reminders:
          default: 1
          description: Bir parti için maksimum gönderilecek hatırlatma sayısı
          example: 2
          minimum: 0
          type: integer
        channels:
          default:
          - email
          description: |
            Hatırlatma gönderim kanalı. Birden fazla seçilebilir
            (`["email","sms"]`). SMS kanalı için partinin `phone` alanı dolu ve
            `send_sms: true` olmalı; email kanalı için `email` dolu ve
            `send_email: true` olmalı, ayrıca demand'in `send_sms_notifications`
            / `send_email_notifications` global toggle'ı açık olmalı.
          example:
          - email
          - sms
          items:
            enum:
            - email
            - sms
            type: string
          type: array
      type: object
    TriggerReminderRequest:
      description: Anlık hatırlatma tetikleme isteği gövdesi (tüm alanlar opsiyonel).
      example:
        channels:
        - sms
        force: false
      properties:
        channels:
          default:
          - sms
          - email
          description: |
            Bu çağrıda kullanılacak kanal(lar). Yollanmazsa default `["sms","email"]`
            ile her iki kanalda da gönderilir (parti `send_sms`/`send_email`
            toggle'ı + iletişim alanı + demand global toggle uygunluğuna göre).
          example:
          - sms
          items:
            enum:
            - email
            - sms
            type: string
          type: array
        force:
          default: false
          description: |
            `true` ise 5 dk anti-spam penceresini override eder (son hatırlatma
            5 dk içinde gönderilmiş olsa bile gönderir). Production akışlarında
            yanlışlıkla spam atmamak için sadece kasıtlı admin operasyonlarında
            kullanın.
          type: boolean
      type: object
