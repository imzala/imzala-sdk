        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        name: name
        description: description
        category: category
        usage_count: 0
        parties:
        - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          order: 6
          label: Musteri
          is_required: true
        - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          order: 6
          label: Musteri
          is_required: true
        pages_count: 1
        variables:
        - slug: adres
          label: ADRES
          item_type: dynamic_text
          is_required: true
          default_source: "{{signer.full_name}}"
          template_party_id: template_party_id
        - slug: adres
          label: ADRES
          item_type: dynamic_text
          is_required: true
