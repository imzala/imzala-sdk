  /api/v1/timestamps:
    post:
      description: |
        Dosyanın SHA-256 hash'ini RFC 3161 standardında TÜBİTAK KAMU SM TSA ile
        imzalar ve bir zaman damgası kaydı oluşturur.

        **Damga neyi kanıtlar:**
        - Dosyanın bu tarih ve saatte var olduğunu (varlık kanıtı)
        - Dosya içeriğinin o andan bu yana değişmediğini (bütünlük kanıtı)

        **Damga neyi kanıtlamaz:**
        - Dosyanın kim tarafından yazıldığını (yazarlık kanıtı DEĞİL)
        - `owner_first_name` / `owner_last_name` alanları bilgilendirme amaçlıdır;
          sahiplik beyanı kullanıcı tarafından yapılır, API tarafından doğrulanmaz.

        Damga elektronik imza DEĞİLDİR. Nitelikli elektronik imza (QES) için
        ayrı imzalama akışını kullanın.

        **İdempotency:** `Idempotency-Key` header'ı (UUID önerilir) ile aynı
        istek tekrar gönderilirse 5 dakika içinde aynı `id` döner, yeni damga
        alınmaz ve kredi kesilmez.

        **İki içerik formatı desteklenir:**
        - `multipart/form-data`: `file` alanıyla ikili dosya yükleme
        - `application/json`: `file_base64` alanıyla standart Base64 (RFC 4648 §4,
          canonical alfabe — data URL öneki veya URL-safe alfabe kabul edilmez)
      parameters:
      - description: |
          Tekrar eden istekleri önlemek için istemci tarafında üretilen benzersiz
          anahtar (UUID önerilir). 5 dakika içinde aynı key ile yapılan istek
          önceki sonucu döner; yeni damga alınmaz, kredi kesilmez.
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/_api_v1_timestamps_post_request"
          application/json:
            schema:
              $ref: "#/components/schemas/_api_v1_timestamps_post_request_1"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_timestamps_post_201_response"
          description: Zaman damgası oluşturuldu
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates_get_401_response"
          description: API key geçersiz veya eksik
        "402":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Yetersiz kredi (INSUFFICIENT_CREDITS)
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: INSUFFICIENT_SCOPE — API key'de timestamps scope yok
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: |
            İstek içeriği işlenemedi. Olası kodlar:
            - `BAD_BASE64` — `file_base64` geçerli standart Base64 değil
            - `STAMP_INVALID` — TSA yanıtı geçersiz zaman damgası döndü
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Rate limit aşıldı (60 istek/dakika per API key)
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: |
            INDETERMINATE — Damga alındı ancak doğrulama sonucu belirsiz. Destek
            ekibiyle iletişime geçin.
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: |
            TSA_UNAVAILABLE — TÜBİTAK KAMU SM zaman damgası servisi geçici olarak
            erişilemiyor. Kısa süre sonra tekrar deneyin.
      summary: Zaman damgası oluştur (eser tescil)
      tags:
      - Timestamps
      x-required-scope: timestamps
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
components:
  responses:
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/_api_v1_templates_get_401_response"
      description: API key geçersiz veya eksik
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
      description: Kayıt bulunamadı
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
      description: |
        Geçersiz istek. Örnek hatalar:
        - "template_id gerekli"
        - "party_mapping gerekli (en az 1 taraf)"
        - "party_mapping[0].first_name ve last_name gerekli"
        - "party_mapping[0].email veya phone gerekli"
        - "party_mapping[0].variables object olmalı"
        - "party_mapping[0].variables.adres value'su string|number|boolean|null olmali"
        - "variables object olmalı"
        - "template_party_id duplicate'i bulundu: <id>"
  schemas:
    TemplateSummary:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        name: name
        description: description
        category: category
        usage_count: 0
        parties:
        - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          order: 6
          label: label
          is_required: true
        - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          order: 6
          label: label
          is_required: true
      properties:
        id:
          format: uuid
          type: string
        name:
          type: string
        description:
          nullable: true
          type: string
        category:
          nullable: true
          type: string
        usage_count:
          type: integer
        parties:
          items:
            $ref: "#/components/schemas/TemplateSummary_parties_inner"
          type: array
      type: object
    TemplateDetail:
