  version: 1.7.0
servers:
- description: Production
  url: https://api-prd.imzala.org
- description: Test
  url: https://test-api.imzala.org
security:
- ApiKeyAuth: []
tags:
- description: Sözleşme talepleri
  name: Demands
- description: Sözleşme şablonları
  name: Templates
- description: |
    Sözleşmedeki imzalanmamış taraflara hatırlatma tetikleme ve hatırlatma
    ayarlarını yapılandırma. Şablona kaydedilen `reminder_settings` yeni
    oluşturulan sözleşmeye otomatik aktarılır; ayrıca `POST
    /api/v1/demands/{id}/reminders` ile anlık hatırlatma tetiklenebilir.
  name: Reminders
- description: |
    Olay-tabanlı bildirimler. Webhook'lar dashboard'dan oluşturulur
    (`Ayarlar -> Webhook'lar`); aşağıdaki olay tipleri tetiklendiğinde
    imzala sizin endpoint'inize POST eder. Tüm payload'lar `X-Imzala-Signature-256`
    ile HMAC-SHA256 imzalı gelir; doğrulama, retry ve idempotency detayları
    için bu sayfanın üst kısmındaki **Webhooks** bölümüne bakın.
  name: Webhooks
- description: "API key sahibinin kullanıcı ve workspace bilgisi, kredi bakiyesi."
  name: Account
- description: |
    RFC 3161 zaman damgası (eser tescil). Dosyanın SHA-256 hash'i TÜBİTAK KAMU SM
    TSA tarafından imzalanır; bu belgenin belirtilen tarihte var olduğunu ve
    içeriğinin değişmediğini kanıtlar. Yazarlık veya sahiplik kanıtı DEĞİLDİR.
  name: Timestamps
paths:
  /api/v1/templates:
    get:
      description: Aktif şablonlarınızı listeler.
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates_get_200_response"
          description: Başarılı
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates_get_401_response"
          description: API key geçersiz veya eksik
      summary: Şablon listesi
      tags:
      - Templates
      x-required-scope: templates
      x-accepts:
      - application/json
  /api/v1/templates/{id}:
    delete:
      description: Şablonu siler (soft delete). Mevcut sözleşmeler etkilenmez.
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__delete_200_response"
          description: Silindi
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
          description: Kayıt bulunamadı
      summary: Şablon sil
      tags:
      - Templates
      x-required-scope: templates
      x-accepts:
      - application/json
    get:
      description: |
        Şablonun parties + variables bilgisini döner. variables array'ı
        tüm FILLABLE_TYPES tiplerini içerir (dynamic_text, cells, date,
        dropdown, text). Slug bazında dedupe; multi-party şablonlarda aynı
        slug birden fazla partide olabilir, her parti için ayrı satır.
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__get_200_response"
          description: Başarılı
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
          description: Kayıt bulunamadı
      summary: Şablon detay
      tags:
      - Templates
      x-required-scope: templates
      x-accepts:
      - application/json
    patch:
      description: |
        Şablonun yalnızca metadata alanlarını (name / description / category)
        günceller. Sayfa/alan/taraf yapısı bu endpoint'ten DEĞİŞTİRİLEMEZ
        (şablon içeriği panelden düzenlenir).
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_api_v1_templates__id__patch_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__patch_200_response"
          description: Güncellendi
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
          description: |
            Geçersiz istek. Örnek hatalar:
            - "template_id gerekli"
            - "party_mapping gerekli (en az 1 taraf)"
            - "party_mapping[0].first_name ve last_name gerekli"
            - "party_mapping[0].email veya phone gerekli"
            - "party_mapping[0].variables object olmalı"
            - "party_mapping[0].variables.adres value'su string|number|boolean|null olmali"
            - "variables object olmalı"
            - "template_party_id duplicate'i bulundu: <id>"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
          description: Kayıt bulunamadı
      summary: Şablon metadata güncelle
      tags:
      - Templates
      x-required-scope: templates
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/v1/templates/{id}/usage:
    get:
      description: |
        Bu şablonu API üzerinden çağırmak için tam rehber döner:
        - `endpoint` (POST URL'i)
        - `required_headers` (X-API-Key, X-Workspace-Id, Content-Type)
        - `parties` (her partinin desteklediği field listesi)
        - `variables` (her field için slug, label, item_type, is_required,
          default_source, auto_filled, template_party_id)
        - `example_request` (tam curl + JSON örneği, gerçek slug'larla)

        Multi-party şablonlarda example.party_mapping[i].variables uygun
        slug'larla doludur, root `variables` partisiz field'lar için.
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__usage_get_200_response"
          description: Başarılı
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates__id__get_404_response"
          description: Kayıt bulunamadı
      summary: Şablon kullanım kılavuzu (curl + JSON örnek)
      tags:
      - Templates
      x-required-scope: templates
      x-accepts:
      - application/json
  /api/v1/demands:
    get:
      description: |
        Workspace + rol farkındalıklı sözleşme listesi. KVKK veri minimizasyonu:
        yalnızca sözleşme başlığı/durumu + imzacı SAYILARI döner (`parties_total`,
        `parties_signed`). Taraf adı/e-posta/telefon ve ham IP/cihaz/TC/konum HİÇ
        döndürülmez — taraf detayı için `GET /demands/{id}`.
      parameters:
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - DRAFT
          - PENDING
          - COMPLETED
          - CANCELLED
          - EXPIRED
          type: string
        style: form
      - description: Başlık araması
        explode: true
        in: query
        name: q
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: from
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: to
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: template_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Sayfa boyutu (page_size ile aynı)
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          type: integer
        style: form
      - description: alan:yön (ör. createdAt:desc)
        explode: true
        in: query
        name: sort
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_demands_get_200_response"
          description: Başarılı
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_templates_get_401_response"
          description: API key geçersiz veya eksik
      summary: "Sözleşme listesi (counts-only, PII'siz)"
      tags:
      - Demands
      x-required-scope: demands
      x-accepts:
      - application/json
    post:
      description: |
        Belirtilen şablondan yeni bir sözleşme oluşturur, taraf bilgilerini
        kaydeder, dynamic field'ları `variables` payload'undan doldurur ve
        imzalama URL'lerini döner.

        **Variable resolution:**
        - Item'ın `template_party_id` non-null → `party_mapping[i].variables`'ta
          o slug var ise oradan uygulanır
        - Yoksa root `variables`'tan fallback
        - Hiçbiri yoksa item boş kalır (signer manuel doldurabilir,
          `editable: true` ise)

        **Validation:**
        - `party_mapping[i].variables` ve root `variables` object olmalı
        - Variable value'ları `string | number | boolean | null` olmalı
          (object/array reject)
        - `template_party_id` party_mapping içinde unique olmalı
      requestBody:
        content:
          application/json:
            examples:
              singleParty:
                summary: Tek partili şablon (örn. Vize Danışmanlığı)
                value:
                  template_id: 7ec4b653-e84a-47f1-9e0b-7671e1aae2a1
                  title: Vize Danışmanlığı - Ada Kalkan
                  party_mapping:
                  - template_party_id: e5b4e0cb-c2d5-473f-9f62-44d51c76f56e
                    first_name: Ada
                    last_name: Kalkan
                    email: ada@example.com
                    phone: "+905304636743"
                    government_id: "36747474747"
                    variables:
                      adres: "Atatürk Cad. No: 12, Çankaya/Ankara"
                      danismanlik_ucreti: 5.000 TL
