openapi: 3.0.3
info:
  title: imzala External API
  version: 1.6.0
  description: >
    imzala.org dış API'si — şablondan sözleşme oluşturma ve takip.


    **Sürüm:** 1.6.0 · **Son güncelleme:** 2026-06-30


    ## Auth

    Tüm istekler `X-API-Key` header'ı gerektirir. API key dashboard üzerinden

    oluşturulur: **API & Geliştirici** sayfası
    (https://app.imzala.org/developer)

    veya **Hesap Ayarları -> API Anahtarları**.


    ## Workspace (organizasyon)

    Organizasyon içinde oluşturulmuş bir API key kullanıyorsanız
    `X-Workspace-Id`

    header'ı göndermeniz gerekir (organizasyon UUID'si). Kişisel anahtarlar için

    bu header gerekmez.


    ## Multi-Party Variables (parti-bazlı ve ortak field'lar)

    `POST /api/v1/demands` payload'ında iki tip "variables" alanı vardır:


    - `party_mapping[i].variables` — **bu partiye ait** field'lar
      (örn. Kira sözleşmesinde Kiraya Veren'in `address`, `iban` field'ları)
    - `variables` (root) — **partilerden bağımsız** field'lar
      (örn. `kira_baslangic_tarihi`, `kira_bedeli`)

    Resolution sırası:

    1. Item'ın template_party_id'si var ve o parti slug'ı göndermişse → uygula

    2. Yoksa root `variables`'tan ara → varsa uygula

    3. Yoksa atla


    Dashboard'daki **API Kullanımı** tab'ı (`/sablonlar/<id>`) hangi field'in

    hangi gruba gittiğini gösterir. Veya yeni `GET /api/v1/templates/{id}/usage`

    endpoint'i aynı bilgiyi JSON olarak döner.


    ## Sessiz Başarısızlık Yok

    `POST /api/v1/demands` cevabında `variables_ignored` array'ı, gönderdiğiniz

    ama şablonda eşleşmeyen slug'ları listeler. Boş olmadığında yazım hatası

    yapmışsınız demektir — log'ta veya dashboard'da kontrol edin.


    ## Rate Limit

    - 60 istek/dakika per API key

    - Aşılırsa 429 döner


    ## Hatalar

    Standart HTTP kodları: 400 (geçersiz veri), 401 (auth), 403 (yetki),

    404 (yok), 429 (rate limit), 500 (sunucu)


    ## Loglar

    Tüm API istekleriniz dashboard'da `Geliştirici -> Etkinlik Logu` sayfasında

    görünür (request body, response body, headers, status code, süre).

    30 gün retention.


    ## Hatırlatma Sistemi

    İmzalanmamış taraflara hatırlatma SMS/e-posta'sı **iki yolla** gönderilir:


    **1. Otomatik (scheduled) hatırlatmalar — şablona/sözleşmeye gömülü**


    Şablon (Template) seviyesinde `reminder_settings` (interval saatleri,

    max sayısı, kanallar) tanımlayabilirsiniz. Şablondan demand oluştururken

    bu değerler yeni sözleşmenin `ReminderConfig` satırına otomatik kopyalanır

    ve BullMQ worker'ı zamanı geldiğinde sessiz şekilde hatırlatır.


    - Dashboard editörden ayarlanır: `app.imzala.org/sablonlar/<id>/duzenle`
      → **Sözleşme Ayarları** → **Otomatik Hatırlatma** + **Hatırlatma Kanalı**
    - Veya `POST /api/v1/demands` çağrısında body'de `reminder_settings`
      alanıyla **bu sözleşme için override** edebilirsiniz (şablon default'unu
      ezer, sadece bu demand'a uygulanır)
    - Default: `{enabled: true, intervals_hours: [48], max_reminders: 1,
    channels: ["email"]}`


    **2. Manuel (anlık) hatırlatma — tetikleme endpoint'i**


    `POST /api/v1/demands/{id}/reminders` ile **şu an** SMS/e-posta hatırlatması

    gönderebilirsiniz. Anti-spam: Aynı sözleşme için son hatırlatmadan 5 dakika

    geçmemişse 429 `RATE_LIMITED` döner; `force: true` ile override edilebilir.


    **Kişi başına sert sınırlar (override edilemez):**

    - Bir kişiye en fazla 3 SMS reminder gönderilebilir (otomatik scheduled +
      manuel trigger toplam).
    - Bir kişiye en fazla 3 e-posta reminder gönderilebilir.

    - Sınıra ulaşan kişi response'un `details[]` listesinde
      `skipped` olarak görünür (`reason: "party_sms_cap_reached (3)"` veya
      `"party_email_cap_reached (3)"`); diğer kişilere gönderim devam eder.
    - `force: true` bu kişi-başı sınırları override etmez.


    ```bash

    # Default — SMS + e-posta birlikte (parti eligibility'sine göre)

    curl -X POST https://api-prd.imzala.org/api/v1/demands/<demand_id>/reminders
    \
      -H "X-API-Key: imz_..." \
      -H "Content-Type: application/json" -d '{}'

    # Sadece SMS, anti-spam override

    curl -X POST https://api-prd.imzala.org/api/v1/demands/<demand_id>/reminders
    \
      -H "X-API-Key: imz_..." \
      -H "Content-Type: application/json" \
      -d '{"channels": ["sms"], "force": true}'
    ```


    Detay için **Reminders** tag'i altındaki endpoint'e bakın.


    ## Webhooks

    imzala olay gerçekleştiğinde (sözleşme tamamlandı, taraf imzaladı vb.) sizin

    belirlediğiniz HTTPS URL'ye `POST` ile JSON payload gönderir. Webhook'lar

    dashboard'dan yönetilir: **Ayarlar -> Webhook'lar**

    (https://app.imzala.org/settings/webhooks). API üzerinden CRUD desteklenmez.


    ### Workspace kapsamı

    - **Organizasyon webhook'u** (org workspace'inde oluşturulduysa) → o
      organizasyon altındaki TÜM üyelerin event'lerinde tetiklenir
    - **Kişisel webhook** (kişisel workspace'te) → sadece sizin kendi
      event'lerinizde tetiklenir

    ### Olay tipleri (6)

    | Olay | Tetikleyici |

    |------|-------------|

    | `demand.created` | Yeni sözleşme oluşturuldu |

    | `demand.completed` | Tüm taraflar imzaladı |

    | `demand.expired` | Sözleşme süresi doldu |

    | `party.signed` | Bir taraf imzaladı |

    | `party.viewed` | Bir taraf imza sayfasını ilk kez açtı |

    | `party.rejected` | Bir taraf reddetti |


    ### Header'lar

    Her istekte aşağıdaki header'lar gönderilir:


    ```

    Content-Type: application/json

    User-Agent: Imzala-Webhook/1.0

    X-Imzala-Event: <olay tipi, örn. demand.completed>

    X-Imzala-Delivery: <delivery UUID — idempotency key>

    X-Imzala-Signature-256: sha256=<HMAC-SHA256 hex>

    ```


    ### Payload zarfı

    Tüm olaylar aynı zarfı kullanır:


    ```json

    {
      "id": "evt_abc123...",
      "type": "demand.completed",
      "created_at": "2026-05-07T08:30:00.000Z",
      "data": { "...olay-özel alanlar..." }
    }

    ```


    - `id` — `evt_<32-hex>`. Idempotency için kullanın (DB'de unique key).

    - `type` — yukarıdaki 6 olay tipinden biri (lowercase).

    - `created_at` — olay zamanı (ISO 8601 UTC).

    - `data` — her olaya özel (aşağıda her olay için ayrı şema).


    ### İmza doğrulama (HMAC-SHA256)

    Webhook oluşturduğunuzda dashboard size `whsec_<64-hex>` formatında bir

    secret döner — **sadece bir kez gösterilir**, güvenli yere kaydedin.


    Her isteğin ham gövdesi (body) bu secret ile HMAC-SHA256 imzalanır ve

    `X-Imzala-Signature-256: sha256=<hex>` header'ında gönderilir. Doğrulama

    Node.js örneği:


    ```js

    const crypto = require('crypto');


    function verify(rawBody, header, secret) {
      const expected = 'sha256=' + crypto
        .createHmac('sha256', secret)
        .update(rawBody, 'utf8')
        .digest('hex');
      return crypto.timingSafeEqual(
        Buffer.from(header || '', 'utf8'),
        Buffer.from(expected, 'utf8')
      );
    }


    // Express

    app.post('/webhook', express.raw({ type: 'application/json' }), (req, res)
    => {
      const sig = req.header('X-Imzala-Signature-256');
      if (!verify(req.body, sig, process.env.IMZALA_WEBHOOK_SECRET)) {
        return res.status(401).send('invalid signature');
      }
      const event = JSON.parse(req.body.toString('utf8'));
      // ... event'i kuyruğa koy ve hemen 2xx dön
      res.status(200).send('ok');
    });

    ```


    > **Önemli:** Body'yi parse etmeden ham byte üzerinden imzalayın. Çoğu

    > framework (Express, FastAPI vs.) "raw body" middleware'i sağlar.


    ### Yeniden deneme politikası

    - **Başarı:** HTTP 2xx — delivery `SENT` olarak işaretlenir.

    - **Başarısızlık:** 2xx dışı veya bağlantı hatası — yeniden denenir.

    - **Per-attempt timeout:** 10 saniye (yapılandırılabilir env:
    `WEBHOOK_TIMEOUT_MS`).

    - **Maksimum deneme:** 6 (ilk + 5 retry).

    - **Backoff (exponential):** 30s → 2dk → 10dk → 30dk → 2sa.

    - **Tükenirse:** delivery `DEAD_LETTER` olur, dashboard'dan manuel
      "Tekrar Gönder" mümkün.

    Endpoint'iniz **10 saniyeden kısa sürede 2xx dönmelidir**. Ağır işleri

    (DB yazma, e-posta vs.) async kuyruğa atın.


    ### Idempotency

    Aynı olay birden fazla kez gönderilebilir (network retry, manuel redeliver,

    backfill). Receiver tarafında **`payload.id`** unique olduğu için bunu

    DB'de tek seferlik kayıt için kullanın:


    ```sql

    CREATE TABLE imzala_webhook_seen (
      event_id TEXT PRIMARY KEY,
      received_at TIMESTAMPTZ DEFAULT now()
    );

    -- INSERT ... ON CONFLICT DO NOTHING; sonuç 0 satır ise zaten gördük → skip

    ```


    ### Backfill flag

    Geçmiş olayları yeniden tetiklemek (örn. webhook bug fix'inden sonra

    kayıp event'leri yakalamak) için bazı payload'larda `data._backfill: true`

    bayrağı bulunur. Bu durumda receiver:


    - Loglama için kayıt edebilir

    - Side-effect tetikleyicilerini (ödeme, e-posta gönderme, vs.) **atlamalı**

    - `id` zaten görülmüşse normal flow'a devam edebilir


    ```js

    if (event.data._backfill === true) {
      await logReplay(event);
      return res.status(200).send('replay accepted');
    }

    ```


    ### Manuel yeniden gönderim

    Dashboard'da `Ayarlar -> Webhook'lar -> <webhook> -> Teslim Geçmişi`:


    - Her satırda **Tekrar Gönder** butonu (PENDING dışında her statü için)

    - Üstte **Son 5'i Tekrar Gönder** toplu butonu (max 50 değiştirilebilir)

    - Yeni delivery kaydı oluşur, orijinali bozmaz (audit trail korunur)


    ### En iyi pratikler

    1. Aynı `id`'yi tekrar görürseniz işlemi atla (idempotency).

    2. İmzayı **timing-safe compare** ile doğrula (string equality değil).

    3. 10sn'den hızlı 2xx dön; ağır işi kuyruğa at.

    4. `_backfill: true` payload'larda side-effect'leri atla.

    5. `X-Imzala-Delivery` UUID'sini log'la — destek talebinde bizimkiyle
       eşleşmesini kolaylaştırır.
    6. HTTPS endpoint kullan; secret'i env var'da sakla, koda gömme.
  contact:
    name: imzala Destek
    email: destek@imzala.org
    url: https://imzala.org
  license:
    name: Proprietary
servers:
  - url: https://api-prd.imzala.org
    description: Production
  - url: https://test-api.imzala.org
    description: Test
tags:
  - name: Demands
    description: Sözleşme talepleri
  - name: Templates
    description: Sözleşme şablonları
  - name: Reminders
    description: |
      Sözleşmedeki imzalanmamış taraflara hatırlatma tetikleme ve hatırlatma
      ayarlarını yapılandırma. Şablona kaydedilen `reminder_settings` yeni
      oluşturulan sözleşmeye otomatik aktarılır; ayrıca `POST
      /api/v1/demands/{id}/reminders` ile anlık hatırlatma tetiklenebilir.
  - name: Webhooks
    description: >
      Olay-tabanlı bildirimler. Webhook'lar dashboard'dan oluşturulur

      (`Ayarlar -> Webhook'lar`); aşağıdaki olay tipleri tetiklendiğinde

      imzala sizin endpoint'inize POST eder. Tüm payload'lar
      `X-Imzala-Signature-256`

      ile HMAC-SHA256 imzalı gelir; doğrulama, retry ve idempotency detayları

      için bu sayfanın üst kısmındaki **Webhooks** bölümüne bakın.
  - name: Account
    description: API key sahibinin kullanıcı ve workspace bilgisi, kredi bakiyesi.
  - name: Timestamps
    description: >
      RFC 3161 zaman damgası (eser tescil). Dosyanın SHA-256 hash'i TÜBİTAK KAMU
      SM

      TSA tarafından imzalanır; bu belgenin belirtilen tarihte var olduğunu ve

      içeriğinin değişmediğini kanıtlar. Yazarlık veya sahiplik kanıtı DEĞİLDİR.
security:
  - ApiKeyAuth: []
paths:
  /api/v1/templates:
    get:
      tags:
        - Templates
      summary: Şablon listesi
      description: Aktif şablonlarınızı listeler.
      x-required-scope: templates
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      templates:
                        type: array
                        items:
                          $ref: '#/components/schemas/TemplateSummary'
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/templates/{id}:
    get:
      tags:
        - Templates
      summary: Şablon detay
      x-required-scope: templates
      description: |
        Şablonun parties + variables bilgisini döner. variables array'ı
        tüm FILLABLE_TYPES tiplerini içerir (dynamic_text, cells, date,
        dropdown, text). Slug bazında dedupe; multi-party şablonlarda aynı
        slug birden fazla partide olabilir, her parti için ayrı satır.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/TemplateDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/templates/{id}/usage:
    get:
      tags:
        - Templates
      summary: Şablon kullanım kılavuzu (curl + JSON örnek)
      x-required-scope: templates
      description: |
        Bu şablonu API üzerinden çağırmak için tam rehber döner:
        - `endpoint` (POST URL'i)
        - `required_headers` (X-API-Key, X-Workspace-Id, Content-Type)
        - `parties` (her partinin desteklediği field listesi)
        - `variables` (her field için slug, label, item_type, is_required,
          default_source, auto_filled, template_party_id)
        - `example_request` (tam curl + JSON örneği, gerçek slug'larla)

        Multi-party şablonlarda example.party_mapping[i].variables uygun
        slug'larla doludur, root `variables` partisiz field'lar için.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/TemplateUsage'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/demands:
    post:
      tags:
        - Demands
      summary: Sözleşme oluştur (şablondan)
      x-required-scope: demands
      description: |
        Belirtilen şablondan yeni bir sözleşme oluşturur, taraf bilgilerini
        kaydeder, dynamic field'ları `variables` payload'undan doldurur ve
        imzalama URL'lerini döner.

        **Variable resolution:**
        - Item'ın `template_party_id` non-null → `party_mapping[i].variables`'ta
          o slug var ise oradan uygulanır
        - Yoksa root `variables`'tan fallback
        - Hiçbiri yoksa item boş kalır (signer manuel doldurabilir,
          `editable: true` ise)

        **Validation:**
        - `party_mapping[i].variables` ve root `variables` object olmalı
        - Variable value'ları `string | number | boolean | null` olmalı
          (object/array reject)
        - `template_party_id` party_mapping içinde unique olmalı
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDemandRequest'
            examples:
              singleParty:
                summary: Tek partili şablon (örn. Vize Danışmanlığı)
                value:
                  template_id: 7ec4b653-e84a-47f1-9e0b-7671e1aae2a1
                  title: Vize Danışmanlığı - Ada Kalkan
                  party_mapping:
                    - template_party_id: e5b4e0cb-c2d5-473f-9f62-44d51c76f56e
                      first_name: Ada
                      last_name: Kalkan
                      email: ada@example.com
                      phone: '+905304636743'
                      government_id: '36747474747'
                      variables:
                        adres: 'Atatürk Cad. No: 12, Çankaya/Ankara'
                        danismanlik_ucreti: 5.000 TL
                        danismanlik_notlar: Schengen vize başvuru danışmanlığı
                        randevu_takibi_ucreti: 1.500 TL
                        randevu_takibi_notlar: Konsolosluk randevu takibi 60 gün
                        genel_toplam: 6.500 TL
              multiParty:
                summary: Multi-party şablon (örn. Kira Sözleşmesi)
                value:
                  template_id: <kira-template-id>
                  title: Kira Sözleşmesi - Mayıs 2026
                  party_mapping:
                    - template_party_id: <kiraya-veren-id>
                      first_name: Ali
                      last_name: Yilmaz
                      email: ali@x.com
                      phone: '+905551111111'
                      government_id: '12345678901'
                      variables:
                        address: Kiraya verenin adresi
                        iban: TR..01
                    - template_party_id: <kiraci-id>
                      first_name: Veli
                      last_name: Demir
                      email: veli@x.com
                      phone: '+905552222222'
                      government_id: '10987654321'
                      variables:
                        address: Kiracının adresi
                        iban: TR..02
                  variables:
                    kira_baslangic_tarihi: '2026-06-01'
                    kira_bedeli: 12.000 TL
                    depozito: 24.000 TL
      responses:
        '201':
          description: Sözleşme oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CreatedDemand'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Yetersiz kredi (INSUFFICIENT_CREDITS)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Yeterli krediniz yok
        '403':
          description: >
            **SMS_CUSTOMIZATION_NOT_ALLOWED** — Body'de `sms_content` alanı dolu

            gönderildi ama çağıran organizasyon PRO/ENTERPRISE planda değil veya

            kendi SMS sağlayıcı config'i (sender_name dolu) yok. `sms_content`

            alanını çıkarın veya planınızı yükseltip kendi SMS sağlayıcınızı
            tanımlayın.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: SMS_CUSTOMIZATION_NOT_ALLOWED
                  message:
                    type: string
                    example: >-
                      SMS metnini özelleştirebilmek için organizasyonunuzun PRO
                      veya ENTERPRISE planda olması ve kendi SMS sağlayıcınızı
                      tanımlamış olmanız gerekir.
  /api/v1/demands/{id}:
    get:
      tags:
        - Demands
      summary: Sözleşme durumu + imza ilerlemesi
      x-required-scope: demands
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DemandStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/demands/{id}/reminders:
    post:
      tags:
        - Reminders
      summary: Anlık hatırlatma tetikle (imzalanmamış taraflara)
      x-required-scope: demands
      description: >
        Sözleşmenin **henüz imzalamamış** taraflarına SMS ve/veya e-posta

        hatırlatması anlık olarak gönderir. Şablon-/sözleşme-seviyesi

        `reminder_settings` ayarından **bağımsız** olarak çalışır — istediğiniz

        zaman elle tetiklenebilir.


        **Anti-spam koruması:** Aynı sözleşme için son hatırlatmanın üzerinden

        5 dakika geçmemişse 429 `RATE_LIMITED` döner ve `Retry-After` header'ı

        ile `retry_after_seconds` alanı bilgilendirir. Override için body'de

        `force: true` yollayın (yanlışlıkla spam atmamak için kasıtlı kullanın).


        **Kişi başına sert sınırlar (override edilemez):** Spam ve gönderici

        reputasyon koruması için kişi-başına reminder sayısı sınırlıdır:


        - **Bir kişiye en fazla 3 SMS reminder** gönderilebilir (otomatik
          scheduled + manuel trigger toplam). Sayaç dolu kişi için SMS skip
          edilir, `details[]` içinde `reason: "party_sms_cap_reached (3)"` görünür.
        - **Bir kişiye en fazla 3 e-posta reminder** gönderilebilir. Sayaç
          dolu kişi için email skip edilir, `reason: "party_email_cap_reached (3)"`.
        - Diğer kişilere gönderim normal şekilde devam eder; tek bir kişinin
          sayacı dolu diye tüm çağrı reddedilmez.
        - `force: true` 5dk anti-spam pencereyi override eder ama kişi-başı
          cap'i ASLA — sert kural.
        - Sözleşme başına global cap pratikte yok (`999` safety net) — kural
          kişi başınadır.

        Sayım kaynağı: `ReminderLog` tablosu (channel + party_id,
        `status='SENT'`).

        Hem otomatik scheduled (ReminderWorker) hem manuel trigger reminders

        tek toplamda sayılır.


        **Workspace izolasyonu:** `X-Workspace-Id` header'ıyla erişilen

        organizasyonun sözleşmesi olmalıdır; aksi halde 404 `DEMAND_NOT_FOUND`

        (IDOR shield).


        **Kanal eligibility:** Bir parti için

        - `email` kanalı: `party.email` dolu **ve** `party.send_email=true`
        **ve**
          `demand.send_email_notifications=true` ise gönderilir
        - `sms` kanalı: `party.phone` dolu **ve** `party.send_sms=true` **ve**
          `demand.send_sms_notifications=true` ise gönderilir

        **Mesaj içeriği:** Şablonun `sms_reminder_message` alanı (varsa) +

        `signer.first_name` / `{{name}}` / `{{link}}` gibi sistem değişkenleri

        substitute edilir. Şablonda yoksa sistem default reminder mesajı
        kullanılır.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Sözleşme (demand) ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerReminderRequest'
            examples:
              defaultBoth:
                summary: Default — SMS + e-posta birlikte
                value: {}
              smsOnly:
                summary: Sadece SMS gönder
                value:
                  channels:
                    - sms
              forceOverrideRateLimit:
                summary: 5 dk anti-spam penceresini override et (admin operasyonu)
                value:
                  channels:
                    - sms
                    - email
                  force: true
      responses:
        '200':
          description: |
            Hatırlatma kuyruğa alındı. `data.dispatched` her parti için
            hangi kanallarda gönderildiğini gösterir.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      demand_id:
                        type: string
                        format: uuid
                      dispatched:
                        type: array
                        items:
                          type: object
                          properties:
                            party_id:
                              type: string
                              format: uuid
                            first_name:
                              type: string
                            last_name:
                              type: string
                            channels:
                              type: array
                              items:
                                type: string
                                enum:
                                  - email
                                  - sms
                      skipped:
                        type: array
                        description: >-
                          Hatırlatma gönderilmeyen partilerin nedenleriyle
                          birlikte (telefon/email yok, opt-out vs.)
                        items:
                          type: object
                          properties:
                            party_id:
                              type: string
                              format: uuid
                            reason:
                              type: string
                              example: no_phone_number
                      last_reminder_sent_at:
                        type: string
                        format: date-time
        '400':
          description: |
            **INVALID_CHANNELS** — `channels` parametresi yollandı ama boş array
            veya `email`/`sms` dışı bir değer içeriyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: |
            **DEMAND_NOT_FOUND** — Sözleşme bu workspace'te (ya da kişisel
            workspace'te) bulunamadı. IDOR koruması: başka org'un sözleşmesi
            için de bu cevap döner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '409':
          description: |
            **ALREADY_COMPLETED** — Tüm taraflar imzalamış. Hatırlatılacak
            imzalanmamış parti yok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '429':
          description: |
            **RATE_LIMITED** — Son hatırlatmadan 5 dk geçmedi. `Retry-After`
            header'ı + `retry_after_seconds` alanı bekleme süresini gösterir.
            Override için `force: true` ile tekrar deneyin.

            Not: Kişi-başı cap'ler 429 dönmez — o kişiyi `details[]` içinde
            `skipped` olarak işaretler ve diğer kişilere gönderime devam eder
            (200 success). MAX_SMS_REMINDERS_REACHED 429 yalnızca pratikte
            ulaşılmayan global demand cap (999) güvenlik ağı için tanımlı.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Saniye cinsinden bekleme süresi (sadece RATE_LIMITED)
          content:
            application/json:
              examples:
                rateLimited:
                  summary: 5 dk anti-spam pencere — retry edilebilir
                  value:
                    success: false
                    error:
                      code: RATE_LIMITED
                      message: >-
                        Reminder rate limited. Try again in 247s or pass
                        force=true.
                      retry_after_seconds: 247
                smsCapReached:
                  summary: SMS sert üst sınır — retry edilemez
                  value:
                    success: false
                    error:
                      code: MAX_SMS_REMINDERS_REACHED
                      message: >-
                        This demand has already received 3 SMS reminders (max 3
                        per contract). SMS cap reached; further reminders
                        blocked. Email channel still allowed.
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum:
                          - RATE_LIMITED
                          - MAX_SMS_REMINDERS_REACHED
                      message:
                        type: string
                      retry_after_seconds:
                        type: integer
                        description: Sadece RATE_LIMITED'de
  /api/v1/demands/upload:
