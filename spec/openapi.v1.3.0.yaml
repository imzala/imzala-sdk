  /api/v1/timestamps:
    post:
      tags:
        - Timestamps
      summary: Zaman damgası oluştur (eser tescil)
      x-required-scope: timestamps
      description: >
        Dosyanın SHA-256 hash'ini RFC 3161 standardında TÜBİTAK KAMU SM TSA ile

        imzalar ve bir zaman damgası kaydı oluşturur.


        **Damga neyi kanıtlar:**

        - Dosyanın bu tarih ve saatte var olduğunu (varlık kanıtı)

        - Dosya içeriğinin o andan bu yana değişmediğini (bütünlük kanıtı)


        **Damga neyi kanıtlamaz:**

        - Dosyanın kim tarafından yazıldığını (yazarlık kanıtı DEĞİL)

        - `owner_first_name` / `owner_last_name` alanları bilgilendirme
        amaçlıdır;
          sahiplik beyanı kullanıcı tarafından yapılır, API tarafından doğrulanmaz.

        Damga elektronik imza DEĞİLDİR. Nitelikli elektronik imza (QES) için

        ayrı imzalama akışını kullanın.


        **İdempotency:** `Idempotency-Key` header'ı (UUID önerilir) ile aynı

        istek tekrar gönderilirse 5 dakika içinde aynı `id` döner, yeni damga

        alınmaz ve kredi kesilmez.


        **İki içerik formatı desteklenir:**

        - `multipart/form-data`: `file` alanıyla ikili dosya yükleme

        - `application/json`: `file_base64` alanıyla standart Base64 (RFC 4648
        §4,
          canonical alfabe — data URL öneki veya URL-safe alfabe kabul edilmez)
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: >
            Tekrar eden istekleri önlemek için istemci tarafında üretilen
            benzersiz

            anahtar (UUID önerilir). 5 dakika içinde aynı key ile yapılan istek

            önceki sonucu döner; yeni damga alınmaz, kredi kesilmez.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Damgalanacak dosya (maks. 50 MB)
                description:
                  type: string
                  description: Kayıt açıklaması (opsiyonel, max 500 karakter)
                owner_first_name:
                  type: string
                  description: Dosya sahibinin adı (opsiyonel, kullanıcı beyanı)
                owner_last_name:
                  type: string
                  description: Dosya sahibinin soyadı (opsiyonel, kullanıcı beyanı)
          application/json:
            schema:
              type: object
              required:
                - file_base64
                - file_name
              properties:
                file_base64:
                  type: string
                  description: >
                    Standart Base64 kodlanmış dosya içeriği (RFC 4648 §4 —

                    A-Za-z0-9+/ alfabesi, '=' padding). data URL öneki

                    (`data:...;base64,`) ve URL-safe alfabe (`-_`) kabul
                    edilmez.
                file_name:
                  type: string
                  description: Orijinal dosya adı (uzantısıyla, ör. "belge.pdf")
                description:
                  type: string
                  description: Kayıt açıklaması (opsiyonel, max 500 karakter)
                owner_first_name:
                  type: string
                  description: Dosya sahibinin adı (opsiyonel, kullanıcı beyanı)
                owner_last_name:
                  type: string
                  description: Dosya sahibinin soyadı (opsiyonel, kullanıcı beyanı)
      responses:
        '201':
          description: Zaman damgası oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TimestampRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Yetersiz kredi (INSUFFICIENT_CREDITS)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: INSUFFICIENT_SCOPE — API key'de timestamps scope yok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: |
            İstek içeriği işlenemedi. Olası kodlar:
            - `BAD_BASE64` — `file_base64` geçerli standart Base64 değil
            - `STAMP_INVALID` — TSA yanıtı geçersiz zaman damgası döndü
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit aşıldı (60 istek/dakika per API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: |
            INDETERMINATE — Damga alındı ancak doğrulama sonucu belirsiz. Destek
            ekibiyle iletişime geçin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: >
            TSA_UNAVAILABLE — TÜBİTAK KAMU SM zaman damgası servisi geçici
            olarak

            erişilemiyor. Kısa süre sonra tekrar deneyin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 'Format: imz_<64-hex-chars>'
  schemas:
    TemplateSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        usage_count:
          type: integer
        parties:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              order:
                type: integer
              label:
                type: string
              is_required:
                type: boolean
    TemplateDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        usage_count:
          type: integer
        parties:
          type: array
          items:
            $ref: '#/components/schemas/TemplatePartySummary'
        pages_count:
          type: integer
        variables:
          type: array
          items:
            $ref: '#/components/schemas/TemplateVariable'
    TemplatePartySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order:
          type: integer
        label:
          type: string
          example: Musteri
        is_required:
          type: boolean
    TemplateVariable:
      type: object
      properties:
        slug:
          type: string
          example: adres
        label:
          type: string
          example: ADRES
        item_type:
          type: string
          enum:
            - dynamic_text
            - cells
            - date
            - dropdown
            - text
        is_required:
          type: boolean
        default_source:
          type: string
          nullable: true
          example: '{{signer.full_name}}'
          description: |
            Doluysa item değeri otomatik olarak bu kaynaktan dolar
            (örn. signer.full_name → party_mapping'teki ad+soyad).
            variables payload'ında override edilebilir.

            **Kullanılabilir sistem değişkenleri:**

            İmzalayan (party-bağlı, render anında çözülür):
            - `signer.first_name`, `signer.last_name`, `signer.full_name`
            - `signer.email`, `signer.phone`, `signer.government_id`
            - `signer.birth_date` — İmzalayanın doğum tarihi (gg.aa.yyyy).
              Source: `party_mapping[i].birth_date` API alanı.
            - `signer.sign_date` — İmzalayanın imza tarihi (gg.aa.yyyy);
              imzalanmadıysa boş. Source: server-computed
              (`DemandContractParty.sign_timestamp`), API üzerinden
              settable DEĞİL.

            Sözleşme: `contract.title`, `contract.created_date`,
            `contract.expiry_date`, `contract.id`

            Gönderen: `sender.full_name`, `sender.email`, `sender.company_name`

            Tarih: `current.date`, `current.datetime`

            **Precedence — TC alanı ve diğer slug çakışmaları:**
            Eğer `party_mapping[i].government_id` ile
            `party_mapping[i].variables.tc_kimlik` (veya başka slug-eşleşmeli
            variable) aynı anda gönderilirse, **`variables.<slug>` öncelikli**
            olur. Bunun nedeni `applyPartyAwareVariables` slug yazımını önce
            uygular; system variable autofill (`signer.government_id`
            defaultSource'u) sonra çalışır ve dolu alanları atlar.
        template_party_id:
          type: string
          nullable: true
          description: |
            Bu field'in sahibi olan template parti id'si.
            NULL ise root scope (party_mapping dışında) — kök variables'a
            göndermeniz gerekir. Doluysa party_mapping[i].variables'ta i
            bu id ile eşleşen partinin altına göndermeniz gerekir.
    TemplateUsage:
      type: object
      properties:
        template:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            description:
              type: string
              nullable: true
            category:
              type: string
              nullable: true
        endpoint:
          type: object
          properties:
            method:
              type: string
              example: POST
            url:
              type: string
              example: https://api-prd.imzala.org/api/v1/demands
        required_headers:
          type: object
          additionalProperties:
            type: string
          example:
            X-API-Key: <sizin API anahtariniz>
            X-Workspace-Id: ed422ff9-...
            Content-Type: application/json
        parties:
          type: array
          items:
            type: object
            properties:
              template_party_id:
                type: string
                format: uuid
              order:
                type: integer
              label:
                type: string
              is_required:
                type: boolean
              supported_fields:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                    type:
                      type: string
                    required:
                      type: boolean
                    required_if:
                      type: string
                    default: {}
        variables:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              label:
                type: string
              item_type:
                type: string
              is_required:
                type: boolean
              default_source:
                type: string
                nullable: true
              auto_filled:
                type: boolean
              template_party_id:
                type: string
                nullable: true
              note:
                type: string
        example_request:
          type: object
          properties:
            curl:
              type: string
              description: curl komutu, slug'lar dolu
            json:
              type: object
              description: >-
                JSON payload, multi-party-aware (party_mapping[].variables +
                root variables)
    PartyMappingInput:
      type: object
      required:
        - template_party_id
        - first_name
        - last_name
      properties:
        template_party_id:
          type: string
          format: uuid
          description: GET /api/v1/templates/{id} cevabındaki parties[].id
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
          description: email VEYA phone'dan en az biri zorunlu
        phone:
          type: string
          description: E.164 format (örn. "+905551234567")
        government_id:
          type: string
          description: TC kimlik no (11 hane)
        birth_date:
          type: string
          format: date
          description: ISO 8601 (örn. "1990-05-15")
        send_sms:
          type: boolean
          default: true
        send_email:
          type: boolean
          default: true
        variables:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: 'null'
          description: >
            Bu PARTİYE AİT dynamic field'lara gönderilen değerler. Slug bazında

            eşleşir. Item'ın template_party_id'si bu partiyle aynı olmalı;
            değilse

            değişken atlanır ve variables_ignored'a düşürülür.
    CreateDemandRequest:
      type: object
      required:
        - template_id
        - party_mapping
      properties:
        template_id:
          type: string
          format: uuid
          description: GET /api/v1/templates listesinden veya dashboard'dan kopyalayın
        title:
          type: string
          description: Sözleşme başlığı (yoksa template adı kullanılır)
        description:
          type: string
        party_mapping:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PartyMappingInput'
        variables:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: 'null'
          description: >
            **Root scope** — partilerden bağımsız field'lara gönderilen
            değerler.

            Item'ın template_party_id'si NULL ise (partisiz) buradan dolar.

            Multi-party şablonda kira_baslangic_tarihi gibi paylaşılan
            field'lar.
        has_timestamp:
          type: boolean
          default: false
          description: TÜBİTAK zaman damgası
        send_sms_notifications:
          type: boolean
          default: true
        send_email_notifications:
          type: boolean
          default: true
        sms_title:
          type: string
          default: CODECK
          description: SMS gönderici adı
        sms_content:
          type: string
          description: >
            Custom SMS gövdesi. **Sadece** çağıran organizasyon **PRO veya
            ENTERPRISE planda**

            ise ve aktif `OrganizationSmsConfig` (sender_name dolu) varsa kabul
            edilir;

            aksi halde 403 `SMS_CUSTOMIZATION_NOT_ALLOWED` döner.


            FREE/BASIC planda olan veya kendi SMS sağlayıcısı tanımlı olmayan

            müşterilerin marka itibarını korumak için sistem default sağlayıcısı
            (Codeck NetGSM)

            ile gönderim yapılır ve özel metin reddedilir. Kendi sağlayıcınızı
            tanımlamak için

            Dashboard → Organizasyon → SMS Ayarları sayfasını kullanın.


            Boş string / null gönderirseniz "clear" olarak yorumlanır
            (gating'den geçer).
        email_content:
          type: string
          description: Custom e-posta gövdesi
        expiry_date:
          type: string
          format: date-time
        require_tc_verification:
          type: boolean
          default: false
        require_biometric_verification:
          type: boolean
          default: false
        reminder_settings:
          allOf:
            - $ref: '#/components/schemas/ReminderSettings'
          description: >
            Bu sözleşme için hatırlatma ayarlarını **şablon default'unu
            override** ederek

            belirtir. Yollanmazsa şablonun `reminder_*` alanları kullanılır

            (PUT /api/templates/:id ile dashboard'dan kaydedilen değerler);

            şablonda da yoksa `{enabled:true, intervals_hours:[48],
            max_reminders:1, channels:["email"]}`

            default'u uygulanır. Demand oluşumunda `ReminderConfig` satırı
            yaratılır

            ve BullMQ kuyruğuna scheduled hatırlatmalar yazılır.
    ReminderSettings:
      type: object
      description: |
        Hatırlatma yapılandırması. Şablon (`Template.reminder_*`) ve sözleşme
        (`ReminderConfig`) arasında aynı şemaya sahiptir.
      properties:
        enabled:
          type: boolean
          default: true
          description: false → hiç hatırlatma gönderilmez (cron schedule edilmez)
        intervals_hours:
          type: array
          items:
            type: integer
            minimum: 1
          default:
            - 48
          description: |
            Sözleşmenin oluşturulduğu andan itibaren saat cinsinden hatırlatma
            aralıkları. Örn. `[24, 72, 168]` → 24 saat sonra, 3 gün sonra ve
            7 gün sonra. `max_reminders` ile limit edilir.
          example:
            - 24
            - 72
        max_reminders:
          type: integer
          minimum: 0
          default: 1
          description: Bir parti için maksimum gönderilecek hatırlatma sayısı
          example: 2
        channels:
          type: array
          items:
            type: string
            enum:
              - email
              - sms
          default:
            - email
          description: |
            Hatırlatma gönderim kanalı. Birden fazla seçilebilir
            (`["email","sms"]`). SMS kanalı için partinin `phone` alanı dolu ve
            `send_sms: true` olmalı; email kanalı için `email` dolu ve
            `send_email: true` olmalı, ayrıca demand'in `send_sms_notifications`
            / `send_email_notifications` global toggle'ı açık olmalı.
          example:
            - email
            - sms
    TriggerReminderRequest:
      type: object
      description: Anlık hatırlatma tetikleme isteği gövdesi (tüm alanlar opsiyonel).
      properties:
        channels:
          type: array
          items:
            type: string
            enum:
              - email
              - sms
          default:
            - sms
            - email
          description: >
            Bu çağrıda kullanılacak kanal(lar). Yollanmazsa default
            `["sms","email"]`

            ile her iki kanalda da gönderilir (parti `send_sms`/`send_email`

            toggle'ı + iletişim alanı + demand global toggle uygunluğuna göre).
          example:
            - sms
        force:
          type: boolean
          default: false
          description: |
            `true` ise 5 dk anti-spam penceresini override eder (son hatırlatma
            5 dk içinde gönderilmiş olsa bile gönderir). Production akışlarında
            yanlışlıkla spam atmamak için sadece kasıtlı admin operasyonlarında
            kullanın.
    CreatedDemand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          example: PENDING
          enum:
            - DRAFT
            - PENDING
        template_id:
          type: string
          format: uuid
        signing_urls:
          type: array
          items:
            type: object
            properties:
              party_id:
                type: string
                format: uuid
              first_name:
                type: string
              last_name:
                type: string
              email:
                type: string
                nullable: true
              phone:
                type: string
                nullable: true
              signing_url:
                type: string
                format: uri
                example: https://e.imzala.org/imza/<party_id>
        result_url:
          type: string
          format: uri
          example: https://e.imzala.org/sonuc/<demand_id>
        variables_applied:
          type: array
          items:
            type: string
          description: |
            Uygulanan TÜM slug'ların unique union'ı (sorted). Geriye dönük
            uyumluluk için korunur — yeni entegrasyonlar
            variables_applied_root + variables_applied_by_party kullanmalı.
          example:
            - address
            - iban
            - kira_bedeli
        variables_applied_root:
          type: array
          items:
            type: string
          description: Root variables'tan uygulanan slug listesi (sorted).
          example:
            - kira_bedeli
        variables_applied_by_party:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: >
            template_party_id → o partiye uygulanan slug listesi (sorted per
            party).
          example:
            <kiraya-veren-id>:
              - address
              - iban
            <kiraci-id>:
              - address
              - iban
        variables_ignored:
          type: array
          items:
            type: string
          description: >
            Gönderdiğiniz AMA hiçbir item'a uygulanmayan slug'lar (unique,
            sorted).

            Boş olmayınca yazım hatası yapmışsınız demektir — kontrol edin.
          example: []
    CreatedDemandUpload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          example: PENDING
        pages:
          type: array
          description: |
            Oluşturulan sözleşmedeki her sayfanın `id` ve `order` bilgisi.
            `POST /api/v1/demands/{id}/items` endpoint'ine alan yerleştirmek
            için `page_id` parametresi olarak kullanın.
          items:
            $ref: '#/components/schemas/DemandPage'
        signing_urls:
          type: array
          items:
            type: object
            properties:
              party_id:
                type: string
                format: uuid
              first_name:
                type: string
              last_name:
                type: string
              email:
                type: string
                nullable: true
              phone:
                type: string
                nullable: true
              signing_url:
                type: string
                format: uri
        result_url:
          type: string
          format: uri
    DemandPage:
      type: object
      required:
        - id
        - order
      properties:
        id:
          type: integer
          example: 12345
        order:
          type: integer
          example: 1
          description: 1-based sayfa sırası
    PageItem:
      type: object
      required:
        - page_id
        - item_type
        - position_x
        - position_y
        - width
        - height
      description: |
        Sözleşme sayfasına yerleştirilen alan tanımı. Tüm koordinatlar
        sayfa boyutuna göre normalize edilmiş [0,1] aralığında. Origin
        top-left (PDF/canvas standardı).
      properties:
        page_id:
          type: integer
          description: AgreementPage.id (`/upload` response'undaki `pages[].id`)
          example: 12345
        party_id:
          type: string
          format: uuid
          nullable: true
          description: |
            `signature` ve doldurulabilir alanlar (`dynamic_text`,
            `cells`, `date`, `dropdown`, `checkbox`, `radio`) için
            **zorunlu** — alanı dolduracak/imzalayacak partinin id'si
            (`signing_urls[].party_id`). `text` ve `stamp` için null.
        item_type:
          type: string
          enum:
            - signature
            - text
            - dynamic_text
            - cells
            - date
            - dropdown
            - checkbox
            - radio
            - stamp
        position_x:
          type: number
          minimum: 0
          maximum: 1
          description: Sayfa genişliğine göre x koordinatı (sol=0)
        position_y:
          type: number
          minimum: 0
          maximum: 1
          description: Sayfa yüksekliğine göre y koordinatı (üst=0)
        width:
          type: number
          exclusiveMinimum: 0
          maximum: 1
        height:
          type: number
          exclusiveMinimum: 0
          maximum: 1
        is_required:
          type: boolean
          default: false
          description: İmza/alan zorunlu mu — tarafın bu alanı doldurmadan imzalayamadığı
        slug:
          type: string
          pattern: ^[a-z][a-z0-9_]{1,49}$
          nullable: true
          description: |
            Alan tanımlayıcı (snake_case, 2-50 karakter). Doldurulabilir
            alanlar için **önerilir**. `dynamic_text`/`cells` gibi
            değişken alanlarda `config.defaultSource` ile system
            değişkenleri (`{{signer.full_name}}`, `{{signer.government_id}}`
            vb.) bağlanır.
        label:
          type: string
          nullable: true
          description: Kullanıcıya gösterilecek etiket
        config:
          type: object
          nullable: true
          description: |
            Item type'a özgü konfigürasyon:
            - `dynamic_text`: `{ defaultSource, defaultValue }`
            - `cells`: `{ cellCount, defaultSource }`
            - `date`: `{ defaultSource, defaultValue }`
            - `dropdown`/`radio`: `{ options: [{label, value}], defaultValue }`
            - `checkbox`: `{ checkedByDefault }`
            - `stamp`: `{ stampData }` (base64 data URL)
    UpsertItemsRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PageItem'
        page_ids:
          type: array
          items:
            type: integer
          description: |
            **Opsiyonel.** Verilirse sadece bu sayfaların item'ları
            replace edilir; diğer sayfalardaki item'lar korunur.
            Body'deki `items[].page_id` değerleri bu listede olmalıdır.
            Omitted ise tüm sayfaların item'ları replace edilir.
    UpsertItemsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Yaratılan AgreementPageItem snapshot'ı
                properties:
                  id:
                    type: string
                    format: uuid
                  page_id:
                    type: integer
                  party_id:
                    type: string
                    format: uuid
                    nullable: true
                  item_type:
                    type: string
                  position_x:
                    type: number
                  position_y:
                    type: number
                  width:
                    type: number
                  height:
                    type: number
                  is_required:
                    type: boolean
                  slug:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  config:
                    type: object
                    nullable: true
            items_count:
              type: integer
    DemandStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - PENDING
            - COMPLETED
            - EXPIRED
            - CANCELLED
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        parties:
          type: array
          items:
            type: object
            properties:
              party_id:
                type: string
                format: uuid
              first_name:
                type: string
              last_name:
                type: string
              email:
                type: string
                nullable: true
              signed:
                type: boolean
              signed_at:
                type: string
                format: date-time
                nullable: true
              signing_url:
                type: string
                format: uri
        result_url:
          type: string
          format: uri
        pdf_url:
          type: string
          format: uri
          nullable: true
          description: Sadece status=COMPLETED iken dolu
    WebhookEnvelope:
      type: object
      required:
        - id
        - type
        - created_at
        - data
      description: |
        Tüm webhook payload'larının ortak zarfı. `data` alanı olay tipine
        göre değişir; her olay için ayrı veri şeması yukarıda dokümante.
      properties:
        id:
          type: string
          pattern: ^evt_[0-9a-f]{32}$
          example: evt_3a8f9c2b1d4e5f6a7b8c9d0e1f2a3b4c
          description: |
            Olay benzersiz id'si. Receiver tarafında idempotency için kullanın
            (DB'de unique key).
        type:
          type: string
          enum:
            - demand.created
            - demand.completed
            - demand.expired
            - party.signed
            - party.viewed
            - party.rejected
        created_at:
          type: string
          format: date-time
          description: Olay zamanı (ISO 8601 UTC).
        data:
          type: object
          description: Olay tipine özel veri (aşağıdaki şemalar)
    WebhookDataDemandCreated:
      type: object
      required:
        - demand_id
        - title
      properties:
        demand_id:
          type: string
          format: uuid
        title:
          type: string
        _backfill:
          type: boolean
          description: |
            Geçmiş event'i replay etmek için bayrak. Receiver yan etkileri
            (e-posta gönderme, ödeme tetikleme vs.) atlamalı.
    WebhookDataDemandCompleted:
      type: object
      required:
        - demand_id
        - title
        - status
        - completed_at
        - parties
      properties:
        demand_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum:
            - COMPLETED
        completed_at:
          type: string
          format: date-time
        parties:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
                description: first_name + last_name
              email:
                type: string
                nullable: true
              signed_at:
                type: string
                format: date-time
                nullable: true
        _backfill:
          type: boolean
          description: Replay bayrağı (yan etkileri atla)
    WebhookDataDemandExpired:
      type: object
      required:
        - demand_id
        - title
        - expiry_date
        - parties
      properties:
        demand_id:
          type: string
          format: uuid
        title:
          type: string
        expiry_date:
          type: string
          format: date-time
        parties:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              email:
                type: string
                nullable: true
              signed:
                type: boolean
                description: Süre dolduğunda imzalamış mıydı?
    WebhookDataPartySigned:
      type: object
      required:
        - demand_id
        - party_id
      properties:
        demand_id:
          type: string
          format: uuid
        party_id:
          type: string
          format: uuid
        _backfill:
          type: boolean
          description: Replay bayrağı
    WebhookDataPartyViewed:
      type: object
      required:
        - demand_id
        - party_id
      properties:
        demand_id:
          type: string
          format: uuid
        party_id:
          type: string
          format: uuid
    WebhookDataPartyRejected:
      type: object
      required:
        - demand_id
        - party
        - rejected_at
      properties:
        demand_id:
          type: string
          format: uuid
        party:
          type: object
          required:
            - id
            - first_name
            - last_name
          properties:
            id:
              type: string
              format: uuid
            first_name:
              type: string
            last_name:
              type: string
            email:
              type: string
              nullable: true
            rejection_reason:
              type: string
              nullable: true
              description: Tarafın belirttiği sebep (opsiyonel, modal textarea)
        rejected_at:
          type: string
          format: date-time
    StandardError:
      type: object
      description: |
        `code`/`message` formatında standart hata gövdesi. Reminder trigger
        (`POST /api/v1/demands/{id}/reminders`) bu formatı kullanır.
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: DEMAND_NOT_FOUND
              enum:
                - INVALID_CHANNELS
                - DEMAND_NOT_FOUND
                - ALREADY_COMPLETED
                - RATE_LIMITED
                - MAX_SMS_REMINDERS_REACHED
                - UNAUTHORIZED
                - INTERNAL_ERROR
            message:
              type: string
              example: Demand not found
            retry_after_seconds:
              type: integer
              description: Sadece RATE_LIMITED'de doludur
              example: 247
    TimestampRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp_time:
          type: string
          format: date-time
          description: TÜBİTAK KAMU SM'nin onayladığı damga zamanı (UTC)
        tsa_authority:
          type: string
          example: TÜBİTAK KAMU SM
          description: Zaman damgası sağlayıcısı
        file_sha256:
          type: string
          description: Damgalanan dosyanın SHA-256 hash değeri (hex, 64 karakter)
          example: a3f8b1c2d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1
        verify_url:
          type: string
          format: uri
          description: Damgayı doğrulamak için URL
          example: https://imzala.org/dogrula?seri=<id>
        certificate_url:
          type: string
          format: uri
          description: Damga sertifikası URL'i
          example: https://imzala.org/dogrula?seri=<id>
        credits_used:
          type: integer
          description: Bu damga için harcanan kredi miktarı
          example: 4
        credits_remaining:
          type: integer
          description: İşlem sonrası kalan kredi bakiyesi
          example: 0
    ApiError:
      type: object
      description: |
        Standart hata zarfı. `success: false`, `error` makinece okunabilir
        hata kodu, `message` kullanıcıya dönük açıklama.
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: INSUFFICIENT_CREDITS
        message:
          type: string
          example: Yeterli krediniz yok
  responses:
    Unauthorized:
      description: API key geçersiz veya eksik
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Unauthorized
              message:
                type: string
                example: Invalid or missing X-API-Key header
    NotFound:
      description: Kayıt bulunamadı
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Şablon bulunamadı
    BadRequest:
      description: >
        Geçersiz istek. Örnek hatalar:

        - "template_id gerekli"

        - "party_mapping gerekli (en az 1 taraf)"

        - "party_mapping[0].first_name ve last_name gerekli"

        - "party_mapping[0].email veya phone gerekli"

        - "party_mapping[0].variables object olmalı"

        - "party_mapping[0].variables.adres value'su string|number|boolean|null
        olmali"

        - "variables object olmalı"

        - "template_party_id duplicate'i bulundu: <id>"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: party_mapping[0].variables object olmalı
